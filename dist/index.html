<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body class="bg-gray-900 text-white">
    <!-- header starts -->
    <header class="flex items-center justify-center p-2 font-bold  text-green-500">
        <h1 class="text-2xl md:text-3xl bg-gray-800 border-2 border-gray-700 p-3 rounded-lg">Git-Search</h1>
    </header>
    <!-- header ends -->

    <main class="flex flex-col justify-center items-center p-15 md:p-20 gap-10 md:gap-20 md:flex-row">
        <!-- Input-container starts -->
        <div class="input-cont flex justify-center items-center flex-col gap-3 md:gap-4 border-2 border-gray-700 p-4 md:p-6 rounded-lg bg-gray-800">
            <p class="text-lg md:text-2xl px-2 text-gray-300">Search for a GitHub user:</p>
            <input type="text" id="username" class="text-md md:text-lg p-2 rounded-lg text-white w-full outline-none border-2 border-transparent hover:border-green-600" placeholder="Enter GitHub username">
            <button class="md:text-lg text-gray-300 bg-green-700 hover:bg-green-600 active:bg-green-700  font-medium rounded-lg w-full p-1.5 md:p-2">Search</button>
        </div>
        <!-- Input-container ends -->  
    </main>
</body>
</html>
