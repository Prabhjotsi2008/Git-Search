<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Silkscreen] bg-gray-900 text-gray-300 min-h-screen flex flex-col md:px-10">
    <!-- header starts -->
    <header class="flex items-center justify-center p-2 px-4 gap-2 font-bold text-green-500">
        <div class="flex justify-center items-center w-full">
        <h1 id="title-bar" class="text-2xl md:text-3xl bg-gray-800 border-2 border-gray-700 p-3 rounded-lg shadow-sm">Git-Search</h1>
        </div>
        <button id="theme-toggle" class="outline-none bg-gray-800 border-2 border-gray-700 p-3 rounded-lg shadow-sm"><img src="images/dark-mode-github.svg" alt="" id="toggle-icon"></button>
    </header>
    <!-- header ends -->

    <main class="flex flex-col justify-center items-center p-15 md:p-20 gap-10 md:gap-20 md:flex-row">
        <!-- Input-container starts -->
        <div class="input-cont flex justify-center items-center flex-col gap-3 md:gap-4 border-2 border-gray-700 p-4 md:p-6 rounded-lg bg-gray-800 shadow-sm">
            <p class="text-lg md:text-2xl px-2">Search for a GitHub user:</p>
            <input type="text" id="user-input" class="text-md md:text-lg p-2 rounded-lg w-full outline-none border-2 border-transparent hover:border-green-600 text-gray-400" placeholder="Enter GitHub username">
            <button id="search-btn" class="md:text-lg bg-green-500 hover:bg-green-600 active:bg-green-700 font-medium rounded-lg w-full p-1.5 md:p-2 text-gray-200">Search</button>
        </div>
        <!-- Input-container ends --> 
         
        <!-- output-container starts -->
        <div class="output-cont flex justify-center items-center flex-col gap-3 md:gap-4 border-2 border-gray-700 p-4 md:p-6 rounded-lg bg-gray-800 min-w-60 md:min-w-100 shadow-sm">

            <div class="img-cont border-4 border-green-600 rounded-full">
                <a id="link" href="#" class="no-underline cursor-default" target="_blank">
                    <img id="user-img" class="h-32 w-32 rounded-full" src="images/github-svgrepo-com.svg" alt="">
                </a>
            </div>

            <div class="info-cont flex flex-col justify-center items-center gap-2">
                <p id="user-name" class="hidden para text-lg md:text-2xl font-semibold text-center text-green-500">Prabhjot Singh</p>
                <p id="user-bio" class="hidden para text-sm md:text-md text-center text-gray-400">A Btech. student curious to learn web dev</p>
                <p class="hidden para text-md md:text-lg text-center">From: <span class="location text-green-500" id="user-location">Punjab, India</span></p>
                <p class="hidden para text-md md:text-lg text-center">Followers: <span class="followers text-green-500" id="user-followers">18</span></p>
                <p class="hidden para text-md md:text-lg text-center">Following: <span class="following text-green-500" id="user-following">12</span></p>
                <p class="hidden para text-md md:text-lg  text-center">Repos: <span class="repo text-green-500" id="user-repos">19</span></p>
            </div>

            <p id="loader" class="text-xl md:text-2xl text-green-500 text-center font-semibold hidden">Fetching data from GitHub...</p>
    
        </div>
    </main>

    <footer class="mt-auto p-4">
        <p class="text-center text-md">Created by <a href="https://github.com/prabhjotsi2008" target="_blank" class="text-green-500 font-semibold hover:no-underline">Prabhjot Singh</a></p>
    </footer>
    <script src="./script.js"></script>
</body>
</html>
